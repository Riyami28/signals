name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signals
          POSTGRES_PASSWORD: signals_dev_password
          POSTGRES_DB: signals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signals -d signals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SIGNALS_PG_DSN: postgresql://signals:signals_dev_password@127.0.0.1:5432/signals
      SIGNALS_TEST_PG_DSN: postgresql://signals:signals_dev_password@127.0.0.1:5432/signals_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Migration checks
        run: |
          chmod +x scripts/check_migrations.sh
          ./scripts/check_migrations.sh

      - name: Run tests
        run: |
          pytest -q --tb=short
